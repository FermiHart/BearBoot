# SPDX-License-Identifier: BSD-3-Clause
#
# CI for the Bear Boot Protocol.
#
# Runs the same gates a contributor must keep green (see CONTRIBUTING.md):
#   - the core: ABI _Static_asserts + host self-test (adversarial) + fuzzer
#   - every port: freestanding scaffold-check (links vs the frozen core) and,
#     where present, the hosted adapter test.
#
# Everything here runs with the stock distro gcc — no cross toolchain needed
# (the freestanding port flags work with native gcc; CROSS= forces it).

name: ci

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:
  core:
    name: core (abi + self-test + fuzz)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y build-essential
      - name: make check (abi + test + fuzz)
        run: make check

  ports:
    name: ports (scaffold-check + hosted test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y build-essential
      - name: tinalinux — freestanding scaffold + hosted adapter test
        run: |
          cd ports/tinalinux
          make scaffold-check CROSS=
          make test
      - name: minix — freestanding scaffold-check
        run: |
          cd ports/minix
          make scaffold-check CROSS=

  abi-guard:
    name: frozen-core guard (PRs must not touch the ABI)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Warn if a PR modifies the ABI-frozen core
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          # The frozen contract. A port PR should never change these; a change
          # here is a deliberate ABI decision, not a routine contribution.
          frozen='^(include/bbp/|kernel/bbp_kernel\.c|kernel/bbp_kernel\.h|bootloader/bbp_build\.c|bootloader/bbp_build\.h)'
          changed="$(git diff --name-only "$base" "$head")"
          hits="$(echo "$changed" | grep -E "$frozen" || true)"
          if [ -n "$hits" ]; then
            echo "::warning title=Frozen core touched::This PR modifies the ABI-frozen core:"
            echo "$hits" | sed 's/^/  /'
            echo "Review the _Static_assert layout guarantees and bump BBP_VERSION_MAJOR if a struct changed. This is allowed but must be intentional."
          else
            echo "OK: PR does not touch the ABI-frozen core."
          fi
